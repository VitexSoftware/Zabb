import com.android.build.gradle.internal.api.ApkVariantOutputImpl
import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Release signing key lives outside this repo and android/key.properties is
// git-ignored, so this file is absent on F-Droid's build server (and for any
// other contributor). Fall back to debug signing when it's missing so those
// builds still succeed - F-Droid re-signs with its own key when publishing
// anyway, and its "reproducible build" check compares unsigned APK content,
// not signature bytes.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.vitexsoftware.zabb"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.vitexsoftware.zabb"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23  // Required for foreground services and modern notification features
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
        }
    }

    // AGP embeds a "Dependency metadata" block in the APK signing block by
    // default (for Play Store's dependency reporting). F-Droid's scanner
    // flags this as an unwanted extra signing block, so disable it.
    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }
}

flutter {
    source = "../.."
}

// F-Droid builds separate, smaller APKs per ABI (see --split-per-abi in the
// build recipe). Each split APK needs a distinct versionCode, or the F-Droid
// client can't tell which one is newer / installable on a given device.
// The ABI digit goes in the lowest position so ordering across releases is
// preserved: baseVersionCode * 10 + abiCode. A universal (non-split) build
// has no ABI output filter, so its versionCode is left untouched.
def abiCodes = ['armeabi-v7a': 1, 'arm64-v8a': 2, 'x86_64': 3]

android.applicationVariants.configureEach { variant ->
    variant.outputs.forEach { output ->
        def abiVersionCode = abiCodes[output.filters.find { it.filterType == 'ABI' }?.identifier]
        if (abiVersionCode != null) {
            ((ApkVariantOutputImpl) output).versionCodeOverride = variant.versionCode * 10 + abiVersionCode
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.3'
}
